    <path d="M360 220H112v64H34" stroke="url(#cyan)" stroke-width="4"/>
    <path d="M360 220H608v64h78" stroke="url(#cyan)" stroke-width="4"/>
    <path d="M360 220H158v-94H70" stroke="url(#cyan)" stroke-width="3"/>
