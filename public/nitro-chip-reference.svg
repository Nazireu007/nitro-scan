    <path d="M360 220V56" stroke="url(#magenta)" stroke-width="4"/>
    <path d="M360 220v190" stroke="url(#magenta)" stroke-width="5"/>
    <path d="M330 220H210v-34h-38" stroke="#26d9ff" stroke-width="2.4"/>
    <path d="M390 220h120v-34h38" stroke="#26d9ff" stroke-width="2.4"/>
    <path d="M330 236H218v52h-42" stroke="#26d9ff" stroke-width="2.4"/>
    <path d="M390 236h112v52h42" stroke="#26d9ff" stroke-width="2.4"/>
  </g>

  <g filter="url(#hotGlow)">
