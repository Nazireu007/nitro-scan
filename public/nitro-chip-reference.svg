<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-label="Nitro glowing processor with circuit traces">
  <defs>
    <radialGradient id="bg" cx="50%" cy="58%" r="68%">
      <stop offset="0" stop-color="#17345f"/>
      <stop offset="0.42" stop-color="#08142b"/>
      <stop offset="1" stop-color="#02040b"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#08243f" stop-opacity="0"/>
      <stop offset="0.44" stop-color="#26d9ff"/>
      <stop offset="1" stop-color="#26d9ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7b2cff" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#ff35d8"/>
      <stop offset="1" stop-color="#26d9ff" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="13" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="720" height="460" fill="url(#bg)"/>
  <g opacity="0.38">
